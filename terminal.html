<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Terminal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: "SF Mono", "Fira Code", "JetBrains Mono", monospace;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
        }

        .cats-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .floating-cat {
            position: absolute;
            animation: cat-float linear infinite;
            opacity: 0.5;
        }

        @keyframes cat-float {
            0% { transform: translateY(110vh) rotate(-5deg); opacity: 0; }
            5% { opacity: 0.5; }
            50% { transform: translateY(50vh) rotate(8deg); }
            95% { opacity: 0.5; }
            100% { transform: translateY(-15vh) rotate(-3deg); opacity: 0; }
        }

        .scene {
            width: 780px;
            height: 520px;
            position: relative;
            transform-style: preserve-3d;
            z-index: 1;
        }

        .pokedex {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #cc2936, #a81d28);
            border-radius: 20px;
            border: 3px solid #8b1a22;
            box-shadow:
                0 0 60px rgba(204, 41, 54, 0.15),
                0 30px 60px rgba(0, 0, 0, 0.6),
                inset 0 2px 0 rgba(255, 255, 255, 0.1),
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            transform-style: preserve-3d;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px;
        }

        .pokedex-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .lens {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #7dd3fc, #0ea5e9, #0369a1);
            border: 3px solid #e2e8f0;
            box-shadow:
                0 0 12px rgba(14, 165, 233, 0.4),
                inset 0 2px 4px rgba(255, 255, 255, 0.4);
        }

        .indicator-lights {
            display: flex;
            gap: 6px;
        }

        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.2);
        }

        .indicator.red { background: #f87171; box-shadow: 0 0 4px #f87171; }
        .indicator.yellow { background: #fbbf24; box-shadow: 0 0 4px #fbbf24; }
        .indicator.green { background: #34d399; box-shadow: 0 0 4px #34d399; }

        .screen-bezel {
            flex: 1;
            background: #1a1a2e;
            border-radius: 12px;
            border: 3px solid #2a2a3e;
            box-shadow:
                inset 0 2px 8px rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen-header {
            height: 32px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 12px;
            flex-shrink: 0;
        }

        .screen-header-text {
            color: rgba(129, 140, 248, 0.7);
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .screen-content {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .screen-content::-webkit-scrollbar { display: none; }

        .line {
            display: flex;
            align-items: flex-start;
            margin-bottom: 3px;
            line-height: 1.65;
            font-size: 12.5px;
        }

        .prompt {
            color: #f87171;
            margin-right: 8px;
            white-space: nowrap;
            user-select: none;
        }

        .text { color: #e2e8f0; }

        .output {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.65;
            margin-bottom: 3px;
            padding-left: 2px;
        }

        .screen-input {
            padding: 6px 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }

        .input-line {
            display: flex;
            align-items: center;
            font-size: 12.5px;
        }

        .input-line .prompt {
            color: #f87171;
            margin-right: 8px;
        }

        #input {
            background: none;
            border: none;
            outline: none;
            color: #e2e8f0;
            font-family: inherit;
            font-size: inherit;
            flex: 1;
            caret-color: #f87171;
        }

        .pokedex-bottom {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
            padding: 0 4px;
        }

        .dpad {
            width: 60px;
            height: 60px;
            position: relative;
        }

        .dpad-h, .dpad-v {
            position: absolute;
            background: #1a1a2e;
            border-radius: 3px;
            border: 1px solid #2a2a3e;
        }

        .dpad-h { width: 100%; height: 33%; top: 33%; }
        .dpad-v { width: 33%; height: 100%; left: 33%; }

        .dpad-center {
            position: absolute;
            width: 33%; height: 33%;
            top: 33%; left: 33%;
            background: #252540;
            border-radius: 2px;
            z-index: 1;
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .poke-btn {
            width: 36px;
            height: 14px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
        }

        .poke-btn.blue { background: #3b82f6; }
        .poke-btn.green { background: #10b981; }

        .pokeball-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .pokeball {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            transition: none;
        }

        .catch-target {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px dashed rgba(251, 191, 36, 0.6);
            pointer-events: none;
            z-index: 9;
            display: none;
            animation: target-pulse 1.5s ease-in-out infinite;
        }

        @keyframes target-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .catch-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
            z-index: 20;
            pointer-events: none;
            animation: catch-pop 1.5s ease-out forwards;
        }

        @keyframes catch-pop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .color-accent { color: #34d399; }
        .color-warn { color: #fbbf24; }
        .color-info { color: #818cf8; }
        .color-pink { color: #f472b6; }
        .color-red { color: #f87171; }
        .color-blue { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="cats-container" id="cats"></div>
    <div class="catch-target" id="catchTarget"></div>
    <div class="pokeball-area" id="pokeballArea"></div>

    <div class="scene" id="scene">
        <div class="pokedex">
            <div class="pokedex-top">
                <div class="lens"></div>
                <div class="indicator-lights">
                    <div class="indicator red"></div>
                    <div class="indicator yellow"></div>
                    <div class="indicator green"></div>
                </div>
            </div>

            <div class="screen-bezel">
                <div class="screen-header">
                    <span class="screen-header-text">pokedex terminal v1.0</span>
                </div>
                <div class="screen-content" id="content">
                    <div class="output"><span class="color-warn">POKÉDEX TERMINAL ONLINE.</span></div>
                    <div class="output"><span class="color-accent">trainer:</span> atharva sindwani</div>
                    <div class="output" style="margin-bottom: 8px;">type <span class="color-info">help</span> for commands. drag to rotate 3D.</div>
                </div>
                <div class="screen-input">
                    <div class="input-line">
                        <span class="prompt">pokédex&gt;</span>
                        <input type="text" id="input" autofocus spellcheck="false" autocomplete="off">
                    </div>
                </div>
            </div>

            <div class="pokedex-bottom">
                <div class="dpad">
                    <div class="dpad-h"></div>
                    <div class="dpad-v"></div>
                    <div class="dpad-center"></div>
                </div>
                <div class="btn-row">
                    <div class="poke-btn blue"></div>
                    <div class="poke-btn green"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const content = document.getElementById('content');
        const input = document.getElementById('input');
        const catchTarget = document.getElementById('catchTarget');
        const pokeballArea = document.getElementById('pokeballArea');

        // 3D rotation
        let rotX = 0, rotY = 0, targetRotX = 0, targetRotY = 0;
        let isDragging = false, lastX, lastY;

        document.addEventListener('mousedown', (e) => {
            if (e.target === input) return;
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) {
                const rect = scene.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width / 2) / rect.width;
                const y = (e.clientY - rect.top - rect.height / 2) / rect.height;
                targetRotX = -y * 6;
                targetRotY = x * 6;
            } else {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                targetRotY += dx * 0.4;
                targetRotX -= dy * 0.4;
                targetRotX = Math.max(-35, Math.min(35, targetRotX));
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        function animate() {
            rotX += (targetRotX - rotX) * 0.08;
            rotY += (targetRotY - rotY) * 0.08;
            scene.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        // Hand-drawn SVG cats
        const catSVGs = [
            // sitting cat
            `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 45c0-8 3-14 10-14s10 6 10 14"/><path d="M22 31c-2-8-1-14 1-18l5 6 5-6c2 4 3 10 1 18"/><circle cx="26" cy="28" r="1.5" fill="currentColor"/><circle cx="34" cy="28" r="1.5" fill="currentColor"/><path d="M29 31c0 1 1 1.5 1.5 1.5S32 32 32 31"/><path d="M25 33q5 3 10 0"/><path d="M38 40c3 2 7 3 10 2"/><path d="M22 40c-3 2-7 3-10 2"/></svg>`,
            // walking cat
            `<svg viewBox="0 0 70 50" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 25c5-2 12-2 20 0s15 1 20-1"/><path d="M18 25l-3 15M25 24l1 16M42 24l1 16M50 24l3 15"/><path d="M15 25c-2-5-1-10 1-14l4 4 4-5c2 4 2 9 0 14"/><circle cx="16" cy="16" r="1" fill="currentColor"/><circle cx="22" cy="16" r="1" fill="currentColor"/><path d="M50 23c3-1 6 0 8 2"/><path d="M52 22q4-2 7 0"/></svg>`,
            // curled cat
            `<svg viewBox="0 0 60 50" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="30" cy="32" rx="15" ry="10"/><path d="M18 28c-2-6 0-12 3-15l3 4 4-4c2 4 3 9 1 14"/><circle cx="21" cy="20" r="1.2" fill="currentColor"/><circle cx="27" cy="20" r="1.2" fill="currentColor"/><path d="M23 23q2 2 4 0"/><path d="M42 35c4 2 6 5 5 8"/></svg>`,
            // stretching cat
            `<svg viewBox="0 0 80 50" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 35c10-8 25-10 40-5"/><path d="M20 35l-5 10M25 32l-1 13M52 31l2 14M58 30l4 12"/><path d="M15 35c-3-4-2-10 1-14l3 3 3-4c2 3 2 8 0 12"/><circle cx="15" cy="25" r="1" fill="currentColor"/><circle cx="20" cy="25" r="1" fill="currentColor"/><path d="M58 28c3-2 6-1 8 1"/></svg>`,
            // playful cat
            `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M25 40c2-6 5-10 10-10s7 5 8 10"/><path d="M27 30c-3-6-2-12 0-16l4 5 4-5c2 4 3 10 1 16"/><circle cx="28" cy="22" r="1.5" fill="currentColor"/><circle cx="34" cy="22" r="1.5" fill="currentColor"/><path d="M30 25q1 1.5 2 0"/><path d="M20 22l-6-4M18 20l-5-6"/><path d="M40 22l6-4M42 20l5-6"/><path d="M35 40c4 1 7 4 9 8"/></svg>`
        ];

        const catColors = ['#818cf8', '#f472b6', '#34d399', '#fbbf24', '#60a5fa', '#a78bfa'];

        const catsEl = document.getElementById('cats');
        for (let i = 0; i < 14; i++) {
            const cat = document.createElement('div');
            cat.className = 'floating-cat';
            cat.innerHTML = catSVGs[Math.floor(Math.random() * catSVGs.length)];
            cat.style.color = catColors[Math.floor(Math.random() * catColors.length)];
            cat.style.left = Math.random() * 100 + '%';
            cat.style.width = (Math.random() * 30 + 35) + 'px';
            cat.style.animationDuration = (Math.random() * 14 + 12) + 's';
            cat.style.animationDelay = (Math.random() * 12) + 's';
            catsEl.appendChild(cat);
        }

        // Catch game state
        let catchMode = false;
        let targetX, targetY;

        // Pokéball SVG
        function createPokeballSVG() {
            return `<svg viewBox="0 0 40 40" width="40" height="40">
                <circle cx="20" cy="20" r="18" fill="#fff" stroke="#222" stroke-width="2"/>
                <path d="M2 20h36" stroke="#222" stroke-width="2"/>
                <path d="M2 20a18 18 0 0 1 36 0" fill="#f43f5e"/>
                <circle cx="20" cy="20" r="5" fill="#fff" stroke="#222" stroke-width="2"/>
                <circle cx="20" cy="20" r="3" fill="#f0f0f0"/>
            </svg>`;
        }

        // Commands
        const commands = {
            help: () => [
                '<span class="color-warn">═══ POKÉDEX COMMANDS ═══</span>',
                '',
                '  <span class="color-red">catch</span>      — throw a pokéball! click near the target',
                '  <span class="color-accent">pokedex</span>   — view caught pokémon',
                '',
                '<span class="color-info">═══ TRAINER INFO ═══</span>',
                '',
                '  <span class="color-accent">about</span>     — trainer profile',
                '  <span class="color-accent">skills</span>    — technical abilities',
                '  <span class="color-accent">exp</span>       — experience & battles',
                '  <span class="color-accent">projects</span>  — personal quests',
                '  <span class="color-accent">badges</span>    — achievements & leadership',
                '',
                '<span class="color-pink">═══ SYSTEM ═══</span>',
                '',
                '  <span class="color-accent">flip</span>      — spin the pokédex',
                '  <span class="color-accent">reset</span>     — reset rotation',
                '  <span class="color-accent">matrix</span>    — cascade effect',
                '  <span class="color-accent">clear</span>     — clear screen',
            ],
            about: () => [
                '<span class="color-warn">╔══ TRAINER CARD ══╗</span>',
                '',
                '  <span class="color-pink">name:</span>     atharva sindwani',
                '  <span class="color-pink">region:</span>   urbana, illinois',
                '  <span class="color-pink">class:</span>    BS computer science & advertising',
                '  <span class="color-pink">gym:</span>      university of illinois urbana-champaign',
                '  <span class="color-pink">rank:</span>     GPA 4.00 / 4.00 (dean\'s list x4)',
                '  <span class="color-pink">title:</span>    james scholar, florence j. johnson scholar',
                '  <span class="color-pink">minor:</span>    economics & mathematics',
                '',
                '<span class="color-warn">╚═══════════════════╝</span>',
            ],
            skills: () => [
                '<span class="color-info">═══ TECHNICAL ABILITIES ═══</span>',
                '',
                '  <span class="color-warn">languages:</span>',
                '    C++ • Python • JavaScript • C • Rust',
                '    Swift • Golang • Bash • React • Angular',
                '',
                '  <span class="color-warn">frameworks & tools:</span>',
                '    AWS • Databricks • TensorFlow • PyTorch',
                '    Node.js • Linux • POSIX • IPC • Git • conda',
                '',
                '  <span class="color-accent">type effectiveness: maximum</span>',
            ],
            exp: () => [
                '<span class="color-warn">═══ BATTLE EXPERIENCE ═══</span>',
                '',
                '  <span class="color-red">▸ amazon</span> — TPM intern <span class="color-info">(summer 2026, NYC)</span>',
                '    incoming technical product manager',
                '',
                '  <span class="color-red">▸ mphasis</span> — AI intern <span class="color-info">(summer 2025)</span>',
                '    fuzzy-matching service: 10k+ records/min',
                '    replaced LLM with SLM: 65% cost savings',
                '    reduced response time by 35%',
                '',
                '  <span class="color-red">▸ ncsa spins</span> — ML intern <span class="color-info">(jan-may 2025)</span>',
                '    distributed mHealth platform, 500+ sessions',
                '    multithreaded pipelines, 97% accuracy',
                '',
                '  <span class="color-red">▸ geopop</span> — SWE intern <span class="color-info">(summer 2024)</span>',
                '    ML analytics: NLP + geospatial on 50k+ points',
                '    C++ ETL pipelines, 5000+ transactions',
            ],
            projects: () => [
                '<span class="color-pink">═══ PERSONAL QUESTS ═══</span>',
                '',
                '  <span class="color-accent">⚡ abode</span>',
                '    student housing app — 17,000 users',
                '    multithreaded cloud-scaled backend',
                '',
                '  <span class="color-accent">⚡ devangarAI</span>',
                '    AI linguistic app — 1,000+ users',
                '    real-time OCR language detection',
                '    awarded "best product" at UIUC',
            ],
            badges: () => [
                '<span class="color-warn">═══ GYM BADGES ═══</span>',
                '',
                '  <span class="color-info">★</span> adtech president — founded tech arm of AAF',
                '    grew 0 → 75+ members in one semester',
                '    hosted AI hackathon with 150+ students',
                '',
                '  <span class="color-info">★</span> senior PM @ OTCR consulting',
                '    assisting Google with risk assessments',
                '    built AI chatbot analyzing 1000+ transcripts',
                '',
                '  <span class="color-info">★</span> james scholar — impeccable academics',
                '  <span class="color-info">★</span> florence j. johnson scholar',
                '  <span class="color-info">★</span> dean\'s list x4',
            ],
            catch: () => {
                startCatchMode();
                return [
                    '<span class="color-warn">a wild pokémon appeared!</span>',
                    '<span class="color-accent">click near the target to throw your pokéball!</span>',
                    '<span style="color:#94a3b8">the closer your throw, the better the catch rate.</span>',
                ];
            },
            pokedex: () => {
                if (caught.length === 0) {
                    return ['<span style="color:#94a3b8">no pokémon caught yet. try</span> <span class="color-red">catch</span><span style="color:#94a3b8">!</span>'];
                }
                const lines = ['<span class="color-warn">═══ CAUGHT POKÉMON ═══</span>', ''];
                caught.forEach((p, i) => {
                    lines.push(`  <span class="color-red">#${String(i+1).padStart(3,'0')}</span> <span class="color-accent">${p.name}</span> <span style="color:#94a3b8">— ${p.type}</span>`);
                });
                return lines;
            },
            flip: () => {
                targetRotY += 360;
                return ['<span class="color-pink">pokédex is spinning!</span>'];
            },
            reset: () => {
                targetRotX = 0;
                targetRotY = 0;
                return ['<span class="color-accent">rotation reset.</span>'];
            },
            matrix: () => {
                const chars = 'アイウエオカキクケコサシスセソ0123456789ABCDEF';
                const lines = [];
                for (let i = 0; i < 6; i++) {
                    let line = '';
                    for (let j = 0; j < 42; j++) {
                        const c = chars[Math.floor(Math.random() * chars.length)];
                        const opacity = (Math.random() * 0.7 + 0.3).toFixed(2);
                        line += `<span style="color:rgba(248,113,113,${opacity})">${c}</span>`;
                    }
                    lines.push(line);
                }
                return lines;
            },
            clear: () => {
                content.innerHTML = '';
                return [];
            }
        };

        // Pokémon data
        const pokemon = [
            { name: 'pikachu', type: 'electric' },
            { name: 'charmander', type: 'fire' },
            { name: 'bulbasaur', type: 'grass/poison' },
            { name: 'squirtle', type: 'water' },
            { name: 'eevee', type: 'normal' },
            { name: 'jigglypuff', type: 'normal/fairy' },
            { name: 'mewtwo', type: 'psychic' },
            { name: 'gengar', type: 'ghost/poison' },
            { name: 'snorlax', type: 'normal' },
            { name: 'dragonite', type: 'dragon/flying' },
            { name: 'lucario', type: 'fighting/steel' },
            { name: 'gardevoir', type: 'psychic/fairy' },
            { name: 'gyarados', type: 'water/flying' },
            { name: 'alakazam', type: 'psychic' },
            { name: 'arcanine', type: 'fire' },
            { name: 'lapras', type: 'water/ice' },
            { name: 'umbreon', type: 'dark' },
            { name: 'rayquaza', type: 'dragon/flying' },
        ];

        let caught = [];

        function startCatchMode() {
            catchMode = true;
            targetX = Math.random() * (window.innerWidth - 100) + 50;
            targetY = Math.random() * (window.innerHeight - 100) + 50;
            catchTarget.style.left = targetX + 'px';
            catchTarget.style.top = targetY + 'px';
            catchTarget.style.display = 'block';
            pokeballArea.style.pointerEvents = 'auto';
        }

        pokeballArea.addEventListener('click', (e) => {
            if (!catchMode) return;

            const clickX = e.clientX;
            const clickY = e.clientY;

            // Animate pokeball throw
            const ball = document.createElement('div');
            ball.className = 'pokeball';
            ball.innerHTML = createPokeballSVG();
            ball.style.left = (clickX - 20) + 'px';
            ball.style.top = (clickY - 20) + 'px';
            pokeballArea.appendChild(ball);

            // Calculate distance
            const dist = Math.sqrt((clickX - targetX) ** 2 + (clickY - targetY) ** 2);
            const catchRadius = 80;

            setTimeout(() => {
                ball.remove();

                if (dist < catchRadius) {
                    const rng = Math.random();
                    const catchRate = 1 - (dist / catchRadius);

                    if (rng < catchRate + 0.3) {
                        const mon = pokemon[Math.floor(Math.random() * pokemon.length)];
                        caught.push(mon);
                        catchTarget.style.display = 'none';
                        catchMode = false;
                        pokeballArea.style.pointerEvents = 'none';

                        const msg = document.createElement('div');
                        msg.className = 'catch-msg';
                        msg.textContent = `gotcha! ${mon.name} was caught!`;
                        document.body.appendChild(msg);
                        setTimeout(() => msg.remove(), 1500);

                        addOutput(`<span class="color-accent">★ caught ${mon.name} (${mon.type})!</span>`);
                    } else {
                        addOutput('<span class="color-warn">so close! it broke free. try again!</span>');
                    }
                } else {
                    addOutput('<span class="color-red">the pokéball missed! aim closer to the target.</span>');
                }
            }, 300);
        });

        function addOutput(html) {
            const div = document.createElement('div');
            div.className = 'output';
            div.innerHTML = html;
            content.appendChild(div);
            content.scrollTop = content.scrollHeight;
        }

        // Input handling
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const cmd = input.value.trim().toLowerCase();
                input.value = '';

                const cmdLine = document.createElement('div');
                cmdLine.className = 'line';
                cmdLine.innerHTML = `<span class="prompt">pokédex&gt;</span><span class="text">${escapeHtml(cmd)}</span>`;
                content.appendChild(cmdLine);

                if (cmd && commands[cmd]) {
                    const output = commands[cmd]();
                    output.forEach(line => {
                        const div = document.createElement('div');
                        div.className = 'output';
                        div.innerHTML = line;
                        content.appendChild(div);
                    });
                } else if (cmd) {
                    const div = document.createElement('div');
                    div.className = 'output';
                    div.innerHTML = `<span class="color-red">unknown command:</span> ${escapeHtml(cmd)}. try <span class="color-info">help</span>`;
                    content.appendChild(div);
                }

                content.scrollTop = content.scrollHeight;
            }
        });

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('click', (e) => {
            if (!catchMode) input.focus();
        });
    </script>
</body>
</html>
